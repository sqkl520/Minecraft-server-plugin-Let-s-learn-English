# ============================================================
#  Chinese Message File
#  Supports PlaceholderAPI variables and color codes
# ============================================================

prefix: "&8[&b英语学习&8] &f"

general:
  no-permission: "{prefix}&c你没有权限使用此命令！"
  player-only: "{prefix}&c此命令只能由玩家执行！"
  reload-success: "{prefix}&a配置已重新加载！"
  data-saved: "{prefix}&a玩家数据已保存！"
  unknown-command: "{prefix}&c未知命令。输入 /le help 查看帮助。"
  error: "{prefix}&c错误: {message}"

word:
  session-start: "{prefix}&a开始新的学习会话！难度: &e{difficulty}&a, 模式: &e{mode}"
  session-end: "{prefix}&a学习会话结束！正确率: &e{accuracy}%"
  correct: "{prefix}&a正确！&f(+{score} 分)"
  incorrect: "{prefix}&c错误！正确答案是: &e{answer}"
  mastery-update: "{prefix}&a你对单词 &e{word} &a的掌握度提升到了 &e{mastery}%"
  daily-limit-reached: "{prefix}&c你今天已达到每日学习上限！明天再来吧~"

review:
  notification: "{prefix}&6你有 &e{count} &6个单词需要复习！输入 &e/le review &6开始复习"
  complete: "{prefix}&a复习完成！继续保持！"

dialogue:
  start: "{prefix}&a开始情景对话: &e{scene}"
  npc-greeting: "&e[{npc}]&f {text}"
  grammar-hint: "{prefix}&6语法提示: &e{hint}"
  complete: "{prefix}&a对话练习完成！得分: &e{score}"

achievement:
  unlocked: "{prefix}&6成就解锁: &e{name} &6- {description}"
  progress: "{prefix}&7成就进度: &e{name} &7({current}/{target})"

leaderboard:
  header: "&6&l===== 英语学习排行榜 ====="
  entry: "&e#{rank} &f{player} &7- &b{score} 分"
  footer: "&6&l=============================="

progress:
  view: "{prefix}&a正在查看你的学习进度..."

admin:
  export-start: "{prefix}&a开始导出玩家数据..."
  export-complete: "{prefix}&a数据导出完成！文件: &e{file}"
  player-reset: "{prefix}&a已重置玩家 &e{player} &a的学习数据"
  word-add: "{prefix}&a已添加单词 &e{word} &a到 &e{difficulty} &a单词库"